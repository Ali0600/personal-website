server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text content
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Astro emits content-hashed assets under /_astro/ — safe to cache forever
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML must never be cached so a new deploy is picked up immediately
    location ~ \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Default: serve files, fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Strip server identity
    server_tokens off;
}
